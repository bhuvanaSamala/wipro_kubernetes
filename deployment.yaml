apiVersion: apps/v1
kind: Deployment
metadata:
  name:nginx
  labels:
    first: app
spec: #behaviour of the replicaset
  replicas: 3
  selector:
    matchLabels:
      app: web
  template: 
    metadata:
      labels:
        app: web
    spec: #behaviour of the pod
      containers:
        - name: bhuvana-container
          image: nginx
          ports:
            - containerPort: 80
                    
    